<body>
    
<h1 class="big-text">
    LEARN ABOUT HISTORY
</h1>

<form onsubmit="return true;" class="forum">
    <label for="day">Day:</label><br>
    <input type="text" id="day" name="day" placeholder="1-31"><br>
    <br>
    <label for="month">Month:</label><br>
    <input type="text" id="month" name="month" placeholder="1-12"><br>
    <br>
    <label for="minYear">Minimum Year:</label><br>
    <input type="text" id="minYear" name="minYear" placeholder="Optional"><br>
    <br>
    <label for="maxYear">Maximum Year:</label><br>
    <input type="text" id="maxYear" name="maxYear" placeholder="Optional"><br>
</form>

<br>

<button id="logIt">GO</button>

<div id="theDate"></div>
